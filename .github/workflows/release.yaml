name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Build
        run: make build-linux-amd64

      - name: Install conventional-changelog CLI & preset
        run: |
          npm install -g conventional-changelog-cli
          npm install -g conventional-changelog-conventionalcommits

      - name: Generate changelog
        id: changelog
        run: |
          npx conventional-changelog -p conventionalcommits -r 2 --stdout | \
          awk 'BEGIN {skip=1} /^## / {if (skip) {skip=0; next}} {print}' > tmp_changelog.md

          echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "clean_changelog<<EOF" >> $GITHUB_OUTPUT
          cat tmp_changelog.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Bundle OpenAPI spec
        run: |
          REDOCLY_TELEMETRY=off REDOCLY_SUPPRESS_UPDATE_NOTICE=true \
            npx -y @redocly/cli@2.22.1 bundle -o openapi.yaml ./api/spec.yaml

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.clean_changelog }}
          name: Release ${{ steps.changelog.outputs.tag }}
          files: |
            app-linux-amd64
            openapi.yaml

      - name: Send release notes to Telegram
        if: steps.changelog.outputs.clean_changelog != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_RELEASE_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_CHANGELOG_THREAD_ID }}
        run: |
          MESSAGE="🚀 *Release ${{ steps.changelog.outputs.tag }}*

          ${{ steps.changelog.outputs.clean_changelog }}"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "message_thread_id=${TELEGRAM_THREAD_ID}" \
            --data-urlencode "text=${MESSAGE}"

      - name: Install Ansible
        run: pip install ansible

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Write .env.production
        run: echo "${{ secrets.ENV_PRODUCTION }}" > .env.production


      - name: Write inventory
        run: |
          echo "[all]" > deploy/deploy.ini
          echo "${{ secrets.VPS_HOST }} ansible_user=roasti ansible_ssh_private_key_file=~/.ssh/id_rsa" >> deploy/deploy.ini

      - name: Deploy
        run: make deploy

      - name: Notify deploy success
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_RELEASE_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_CHANGELOG_THREAD_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "message_thread_id=${TELEGRAM_THREAD_ID}" \
            --data-urlencode "text=✅ Release ${{ steps.changelog.outputs.tag }} deployed successfully" \
            --data-urlencode "parse_mode=Markdown"

