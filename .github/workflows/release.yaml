name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Build
        run: make build-linux-amd64

      - name: Generate changelog
        id: changelog
        uses: TriPSs/conventional-changelog-action@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          release-count: 0
          preset: conventionalcommits
          skip-tag: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.clean_changelog }}
          name: Release ${{ steps.changelog.outputs.tag }}
          files: app-linux-amd64

      - name: Install Ansible
        run: pip install ansible

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Write .env.production
        run: echo "${{ secrets.ENV_PRODUCTION }}" > .env.production


      - name: Write inventory
        run: |
          echo "[all]" > deploy/inventory.ini
          echo "${{ secrets.VPS_HOST }} ansible_user=roasti ansible_ssh_private_key_file=~/.ssh/id_rsa" >> deploy/inventory.ini

      - name: Deploy
        run: make deploy

