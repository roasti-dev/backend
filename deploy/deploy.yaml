- name: Deploy
  hosts: all
  become: yes
  become_method: sudo
  vars:
    app_user: roasti
    app_dir: /var/lib/roasti
    app_bin: /usr/local/bin/roasti

  tasks:
    - name: Copy binary
      copy:
        src: ../app-linux-amd64
        dest: "{{ app_bin }}"
        mode: '0755'

    - name: Copy env file
      copy:
        src: ../.env.production
        dest: "{{ app_dir }}/.env"
        owner: "{{ app_user }}"

    - name: Copy service file
      copy:
        src: ./roasti.service
        dest: /etc/systemd/system/{{ app_user }}.service

    - name: Reload systemd and restart service
      systemd:
        daemon_reload: yes
        name: "{{ app_user }}"
        enabled: yes
        state: restarted

    - name: Read SERVER_PORT from .env.production
      shell: grep '^SERVER_PORT=' ../.env.production | cut -d'=' -f2
      register: env_port
      delegate_to: localhost
      become: no

    - name: Healthcheck
      uri:
        url: "http://localhost:{{ env_port.stdout }}/health"
        status_code: 200
      retries: 10
      delay: 2
      register: result
      until: result.status == 200