# yaml-language-server: $schema=https://raw.githubusercontent.com/OAI/OpenAPI-Specification/refs/heads/main/_archive_/schemas/v3.0/schema.yaml
openapi: 3.0.0
info:
  version: 0.0.1
  title: Roasti App

security:
  - BearerAuth: []
tags:
  - name: recipes
    description: Coffee brewing recipes management
  - name: uploads
    description: Image upload and retrieval
  - name: auth
    description: User registration, authentication and token management
  - name: public
    description: Endpoints that do not require authentication
paths:
  /health:
    get:
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string
                example: "OK"
  /api/v1/recipes:
    get:
      tags: [recipes]
      summary: List recipes
      parameters:
        - $ref: "./models.yaml#/components/parameters/ListRecipesParams"
      responses:
        "200":
          description: Paginated list of recipes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipePage"
        "400":
          description: Bad request
        "500":
          description: Internal server error

    post:
      tags: [recipes]
      summary: Create recipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/CreateRecipeRequest"
      responses:
        "201":
          description: Recipe created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRecipeResponse"
        "400":
          description: Bad request

  /api/v1/recipes/{recipe_id}:
    delete:
      tags: [recipes]
      summary: Delete recipe
      parameters:
        - in: path
          name: recipe_id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "400":
          description: Bad request

    put:
      tags: [recipes]
      summary: Update recipe
      parameters:
        - name: recipe_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/UpdateRecipeRequest"
      responses:
        "200":
          description: Recipe updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRecipeResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "403":
          description: Not allowed (not author)
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "404":
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"

    patch:
      tags: [recipes]
      summary: Partially update recipe
      parameters:
        - name: recipe_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/PatchRecipeRequest"
      responses:
        "200":
          description: Recipe updated
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/Recipe"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "403":
          description: Not allowed (not author)
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "404":
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"

  /api/v1/uploads/images/{image_id}:
    get:
      tags: [uploads]
      summary: Get image by ID
      parameters:
        - name: image_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Image file
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          description: Image not found
        "500":
          description: Internal server error

  /api/v1/uploads/images:
    post:
      tags: [uploads]
      summary: Upload an image
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        "201":
          description: Image uploaded successfully
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/Image"
        "400":
          description: Bad request
        "413":
          description: File too large
        "500":
          description: Internal server error

  /api/v1/auth/register:
    post:
      summary: Register a new user
      security: []
      tags: [auth, public]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "409":
          description: Username or email already taken
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "500":
          description: Internal server error

  /api/v1/auth/login:
    post:
      summary: Login with username and password
      security: []
      tags: [auth, public]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "500":
          description: Internal server error

  /api/v1/auth/refresh:
    post:
      summary: Refresh access token
      security: []
      tags: [auth, public]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/TokensResponse"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "500":
          description: Internal server error

  /api/v1/auth/logout:
    post:
      summary: Logout user
      tags: [auth]
      responses:
        "204":
          description: Logged out successfully
        "401":
          description: Unauthorized
        "500":
          description: Internal server error

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
  parameters:
    LimitParam:
      name: limit
      in: query
      description: Maximum number of recipes to return
      required: false
      schema:
        type: integer
        default: 20

    PageParam:
      name: page
      in: query
      description: Page of recipes
      required: false
      schema:
        type: integer
        default: 1

  schemas:
    Page:
      type: object
      description: Generic paginated response
      properties:
        items:
          type: array
          items: {}
          description: List of items on this page
        page:
          type: integer
          format: int
          description: Current page number
        limit:
          type: integer
          format: int
          description: Maximum number of items per page
        total_count:
          type: integer
          format: int
          description: Total number of items available
      required:
        - items
        - page
        - limit
        - total_count
    RecipePage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "./models.yaml#/components/schemas/Recipe"

    CreateRecipeResponse:
      $ref: "./models.yaml#/components/schemas/Recipe"

    UpdateRecipeResponse:
      $ref: "./models.yaml#/components/schemas/Recipe"
