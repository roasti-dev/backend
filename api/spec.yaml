# yaml-language-server: $schema=https://raw.githubusercontent.com/OAI/OpenAPI-Specification/refs/heads/main/_archive_/schemas/v3.0/schema.yaml
openapi: 3.0.0
info:
  version: 0.0.1
  title: Roasti App
  description: Roasti App API

security:
  - BearerAuth: []
  - CookieAuth: []
tags:
  - name: recipes
    description: Coffee brewing recipes management
  - name: uploads
    description: Image upload and retrieval
  - name: auth
    description: User registration, authentication and token management
  - name: profiles
    description: Operations related to user profiles, including current user and public profiles
  - name: public
    description: Endpoints that do not require authentication
paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags:
        - public
      description: Returns the current health status of the service.
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string
                example: "OK"
  /api/v1/recipes:
    get:
      summary: List recipes
      operationId: listRecipes
      description: Returns a paginated list of recipes with optional filters by author, brew method, difficulty, and sorting.
      tags: [recipes]
      parameters:
        - $ref: "./models.yaml#/components/parameters/ListRecipesParams"
      responses:
        "200":
          description: Paginated list of recipes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipePage"
        "400":
          description: Bad request
        "500":
          description: Internal server error

    post:
      summary: Create recipe
      operationId: createRecipe
      description: Creates a new coffee brewing recipe for the authenticated user.
      tags: [recipes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/CreateRecipeRequest"
      responses:
        "201":
          description: Recipe created
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/Recipe"
        "400":
          description: Bad request

  /api/v1/recipes/{recipe_id}:
    get:
      summary: Get recipe by ID
      operationId: getRecipe
      description: Returns a single recipe by its ID.
      tags: [recipes]
      parameters:
        - name: recipe_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Recipe
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/Recipe"
        "403":
          description: Not allowed (not author)
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "404":
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "500":
          description: Internal server error
    delete:
      summary: Delete recipe
      operationId: deleteRecipe
      description: Permanently deletes a recipe. Only the author can delete their own recipe.
      tags: [recipes]
      parameters:
        - in: path
          name: recipe_id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "400":
          description: Bad request

    put:
      summary: Update recipe
      operationId: updateRecipe
      description: Updates an existing recipe. Only the author can update their own recipe.
      tags: [recipes]
      parameters:
        - name: recipe_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/UpdateRecipeRequest"
      responses:
        "200":
          description: Recipe updated
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/Recipe"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "403":
          description: Not allowed (not author)
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "404":
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"

  /api/v1/uploads/images/{image_id}:
    get:
      summary: Get image by ID
      operationId: getImage
      description: Returns an image file by its ID.
      tags: [uploads]
      parameters:
        - name: image_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Image file
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          description: Image not found
        "500":
          description: Internal server error

  /api/v1/uploads/images:
    post:
      summary: Upload an image
      operationId: uploadImage
      description: Uploads an image file and returns its ID and URL.
      tags: [uploads]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        "201":
          description: Image uploaded successfully
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/Image"
        "400":
          description: Bad request
        "413":
          description: File too large
        "500":
          description: Internal server error

  /api/v1/auth/register:
    post:
      summary: Register a new user
      operationId: registerUser
      description: Creates a new user account and returns access and refresh tokens.
      security: []
      tags: [auth, public]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "409":
          description: Username or email already taken
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "500":
          description: Internal server error

  /api/v1/auth/login:
    post:
      summary: Login with username and password
      operationId: loginUser
      description: Authenticates a user with username and password and returns access and refresh tokens.
      security: []
      tags: [auth, public]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "500":
          description: Internal server error

  /api/v1/auth/refresh:
    post:
      summary: Refresh access token
      operationId: refreshToken
      description: Issues a new access token using a valid refresh token.
      security: []
      tags: [auth, public]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/TokensResponse"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "500":
          description: Internal server error

  /api/v1/auth/logout:
    post:
      summary: Logout user
      operationId: logoutUser
      description: Invalidates the provided refresh token, effectively logging the user out.
      tags: [auth]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: './models.yaml#/components/schemas/LogoutRequest'
      responses:
        "204":
          description: Logged out successfully
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "500":
          description: Internal server error

  /api/v1/profiles/me:
    get:
      summary: Get current user profile
      operationId: getMyProfile
      description: Returns the profile of the currently authenticated user.
      tags: [profiles]
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/MyProfile"
        "401":
          description: Unauthorized

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
    CookieAuth:
      type: apiKey
      in: cookie
      name: refresh_token

  schemas:
    RecipePage:
      allOf:
        - $ref: "./models.yaml#/components/schemas/Page"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "./models.yaml#/components/schemas/Recipe"
