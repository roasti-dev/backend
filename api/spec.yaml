# yaml-language-server: $schema=https://raw.githubusercontent.com/OAI/OpenAPI-Specification/refs/heads/main/_archive_/schemas/v3.0/schema.yaml
openapi: 3.0.0
info:
  version: 0.0.1
  title: Roasti App
  description: Roasti App API

security:
  - BearerAuth: []
  - AccessTokenCookie: []
tags:
  - name: recipes
    description: Recipe management and discovery
  - name: uploads
    description: Image upload and retrieval
  - name: auth
    description: User registration, authentication and token management
  - name: users
    description: User account and profile management, including private and public data
  - name: likes
    description: Like and unlike actions on recipes
  - name: public
    description: Endpoints that do not require authentication
paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags:
        - public
      description: Returns the current health status of the service.
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string
                example: "OK"
  /api/v1/recipes:
    get:
      summary: List recipes
      operationId: listRecipes
      description: Returns a paginated list of recipes with optional filters by author, brew method, difficulty, and sorting.
      tags: [recipes]
      parameters:
        - name: author_id
          in: query
          schema:
            type: string
            description: Filter by author
        - name: brew_method
          in: query
          schema:
            $ref: "./models.yaml#/components/schemas/BrewMethod"
        - name: difficulty
          in: query
          schema:
            $ref: "./models.yaml#/components/schemas/Difficulty"
        - name: roast_level
          in: query
          schema:
            $ref: "./models.yaml#/components/schemas/RoastLevel"
        - name: query
          in: query
          schema:
            type: string
            description: Search recipes by title or description
        - name: sort_field
          in: query
          schema:
            type: string
            enum:
              - created_at
              - title
            description: Field to sort by
        - name: sort_direction
          in: query
          schema:
            $ref: "./models.yaml#/components/schemas/SortDirection"
        - name: page
          in: query
          schema:
            $ref: "./models.yaml#/components/schemas/PageParam"
        - name: limit
          in: query
          schema:
            $ref: "./models.yaml#/components/schemas/LimitParam"
      responses:
        "200":
          description: Paginated list of recipes
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/RecipePage"
        "400":
          description: Bad request
        "500":
          description: Internal server error

    post:
      summary: Create recipe
      operationId: createRecipe
      description: Creates a new coffee brewing recipe for the authenticated user.
      tags: [recipes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/CreateRecipeRequest"
      responses:
        "201":
          description: Recipe created
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/Recipe"
        "400":
          description: Bad request

  /api/v1/recipes/{recipe_id}:
    get:
      summary: Get recipe by ID
      operationId: getRecipe
      description: Returns a single recipe by its ID.
      tags: [recipes]
      parameters:
        - name: recipe_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Recipe
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/Recipe"
        "403":
          description: Not allowed (not author)
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "404":
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "500":
          description: Internal server error
    delete:
      summary: Delete recipe
      operationId: deleteRecipe
      description: Permanently deletes a recipe. Only the author can delete their own recipe.
      tags: [recipes]
      parameters:
        - in: path
          name: recipe_id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "400":
          description: Bad request

    put:
      summary: Update recipe
      operationId: updateRecipe
      description: Updates an existing recipe. Only the author can update their own recipe.
      tags: [recipes]
      parameters:
        - name: recipe_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/UpdateRecipeRequest"
      responses:
        "200":
          description: Recipe updated
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/Recipe"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "403":
          description: Not allowed (not author)
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "404":
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"

  /api/v1/recipes/{recipe_id}/like:
    post:
      summary: Toggle like on a recipe
      operationId: toggleRecipeLike
      description: Adds a like if not liked, removes if already liked.
      tags: [likes]
      parameters:
        - name: recipe_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Like toggled
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ToggleLikeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "404":
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"

  /api/v1/recipes/{recipe_id}/clone:
    post:
      summary: Clone a recipe
      operationId: cloneRecipe
      description: Creates a copy of a public recipe authored by another user.
      tags: [recipes]
      parameters:
        - name: recipe_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Cloned recipe
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/Recipe"
        "401":
          description: Unauthorized
        "403":
          description: Cannot clone own recipe
        "404":
          description: Recipe not found
        "500":
          description: Internal server error

  /api/v1/uploads/images/{image_id}:
    get:
      summary: Get image by ID
      operationId: getImage
      description: Returns an image file by its ID.
      security: []
      tags: [uploads]
      parameters:
        - name: image_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Image file
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          description: Image not found
        "500":
          description: Internal server error

  /api/v1/uploads/images:
    post:
      summary: Upload an image
      operationId: uploadImage
      description: Uploads an image file and returns its ID and URL.
      tags: [uploads]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        "201":
          description: Image uploaded successfully
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/Image"
        "400":
          description: Bad request
        "413":
          description: File too large
        "500":
          description: Internal server error

  /api/v1/auth/register:
    post:
      summary: Register a new user
      operationId: registerUser
      description: Creates a new user account and returns access and refresh tokens.
      security: []
      tags: [auth, public]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "409":
          description: Username or email already taken
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "500":
          description: Internal server error

  /api/v1/auth/login:
    post:
      summary: Login with username and password
      operationId: loginUser
      description: Authenticates a user with username and password and returns access and refresh tokens.
      security: []
      tags: [auth, public]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "500":
          description: Internal server error

  /api/v1/auth/refresh:
    post:
      summary: Refresh access token
      operationId: refreshToken
      description: Issues a new access token using a valid refresh token.
      security:
        - RefreshTokenCookie: []
      tags: [auth, public]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/TokensResponse"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "500":
          description: Internal server error

  /api/v1/auth/logout:
    post:
      summary: Logout user
      operationId: logoutUser
      description: Invalidates the provided refresh token, effectively logging the user out.
      tags: [auth]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/LogoutRequest"
      responses:
        "204":
          description: Logged out successfully
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "500":
          description: Internal server error

  /api/v1/users/me:
    get:
      summary: Get current user profile
      operationId: getCurrentUser
      description: Returns the profile of the currently authenticated user.
      tags: [users]
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/CurrentUser"
        "401":
          description: Unauthorized

    patch:
      summary: Update current user profile
      operationId: updateCurrentUser
      description: Updates profile of the currently authenticated user.
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/CurrentUser"
        "400":
          description: Bad request
        "409":
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/ApiErrorResponse"

  /api/v1/users/{user_id}/likes:
    get:
      summary: List liked recipes
      operationId: listUserLikes
      description: Returns a paginated list of recipes liked by the specified user. Private recipes are only visible to their author.
      tags: [users, likes]
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          required: true
          schema:
            $ref: "./models.yaml#/components/schemas/LikeTargetType"
        - name: sort_direction
          in: query
          schema:
            $ref: "./models.yaml#/components/schemas/SortDirection"
        - name: page
          in: query
          schema:
            $ref: "./models.yaml#/components/schemas/PageParam"
        - name: limit
          in: query
          schema:
            $ref: "./models.yaml#/components/schemas/LimitParam"
      responses:
        "200":
          description: Paginated list of liked recipes
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/LikedRecipePage"
        "401":
          description: Unauthorized
        "404":
          description: User not found
        "500":
          description: Internal server error

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token in Authorization header. Takes precedence over cookie.

    AccessTokenCookie:
      type: apiKey
      in: cookie
      name: access_token
      description: Access token stored in HttpOnly cookie.

    RefreshTokenCookie:
      type: apiKey
      in: cookie
      name: refresh_token
      description: Refresh token stored in HttpOnly cookie (used for refresh endpoint)
  schemas: {}
