# yaml-language-server: $schema=https://raw.githubusercontent.com/OAI/OpenAPI-Specification/refs/heads/main/_archive_/schemas/v3.0/schema.yaml
openapi: 3.0.0
info:
  title: Models only
  version: 0.0.1
components:
  schemas:
    LimitParam:
      description: Number of items per page
      type: integer
      format: int32
      default: 20

    PageParam:
      description: Page number
      type: integer
      format: int32
      default: 1
      minimum: 1

    SortDirection:
      type: string
      enum:
        - asc
        - desc
      description: Sort direction

    PaginationParams:
      type: object
      properties:
        limit:
          $ref: "#/components/schemas/LimitParam"
        page:
          $ref: "#/components/schemas/PageParam"

    PaginationMeta:
      type: object
      properties:
        items_count:
          type: integer
          format: int32
          minimum: 0
          description: Number of items on the current page
        current_page:
          type: integer
          format: int32
          minimum: 1
          description: Current page number
        next_page:
          type: integer
          format: int32
          minimum: 1
          description: Next page number
        last_page:
          type: integer
          format: int32
          minimum: 1
          description: Last page number
      required:
        - items_count
        - current_page
        - next_page
        - last_page

    Page:
      type: object
      description: Generic paginated response
      properties:
        items:
          type: array
          items: {}
          description: List of items on this page
        pagination:
          $ref: "#/components/schemas/PaginationMeta"
      required:
        - items
        - pagination

    BrewMethod:
      type: string
      description: Coffee brewing method
      enum:
        - v60
        - french_press
        - aeropress
        - chemex
        - cold_brew
        - expresso_machine
        - moka_pot

    Difficulty:
      type: string
      description: Difficulty level of the recipe
      enum:
        - easy
        - medium
        - hard

    RoastLevel:
      type: string
      description: Coffee roast level
      enum:
        - light
        - medium_light
        - medium
        - medium_dark
        - dark

    BrewStep:
      type: object
      description: Single step of the brewing process
      properties:
        id:
          type: integer
          format: int64
          description: Unique step identifier
        order:
          type: integer
          description: Order of the step in the recipe
        title:
          type: string
          description: Short title of the step
        description:
          type: string
          description: Detailed instructions for the step
        duration_seconds:
          type: integer
          nullable: true
          description: Optional duration of the step in seconds
        image_id:
          type: string
          nullable: true
          description: ID of the uploaded image. Can be resolved via the image upload endpoint.
      required:
        - id
        - order
        - title

    BrewStepPayload:
      type: object
      additionalProperties: false
      description: Single step of the brewing process
      properties:
        order:
          type: integer
          description: Order of the step in the recipe
        title:
          type: string
          description: Short title of the step
        description:
          type: string
          description: Detailed instructions for the step
        duration_seconds:
          type: integer
          nullable: true
          description: Optional duration of the step in seconds
        image_id:
          type: string
          nullable: true
          description: ID of the uploaded image. Can be resolved via the image upload endpoint.
      required:
        - order
        - title

    Recipe:
      type: object
      description: Coffee brewing recipe
      properties:
        id:
          type: string
          description: Unique recipe identifier
        author_id:
          type: string
          description: ID of the user who created the recipe
        author:
          $ref: "#/components/schemas/RecipeAuthor"
          description: Author of the recipe
        origin:
          $ref: "#/components/schemas/RecipeOrigin"
          nullable: true
          description: Present if this recipe was cloned from another recipe
        title:
          type: string
          description: Recipe title
        description:
          type: string
          description: Detailed description of the recipe
        image_id:
          type: string
          nullable: true
          description: ID of the uploaded image. Can be resolved via the image upload endpoint.
        brew_method:
          $ref: "#/components/schemas/BrewMethod"
        difficulty:
          $ref: "#/components/schemas/Difficulty"
        roast_level:
          $ref: "#/components/schemas/RoastLevel"
        beans:
          type: string
          nullable: true
          description: Coffee beans used for the recipe
        note:
          type: string
          nullable: true
          description: Private note visible only to the recipe author
        public:
          type: boolean
          description: Indicates whether the recipe is publicly visible.
        created_at:
          type: string
          format: date-time
          description: "Timestamp when the recipe was created"
        updated_at:
          type: string
          format: date-time
          description: "Timestamp when the recipe was last updated"
        steps:
          type: array
          description: Ordered list of brewing steps
          items:
            $ref: "#/components/schemas/BrewStep"
        likes_count:
          type: integer
          format: int32
          description: Total number of likes
        is_liked:
          type: boolean
          description: Whether the current user has liked this recipe
      required:
        - id
        - author_id
        - author
        - title
        - description
        - brew_method
        - difficulty
        - steps
        - public
        - created_at
        - updated_at
        - likes_count
        - is_liked

    RecipePreview:
      type: object
      description: Lightweight recipe representation for lists and cards
      properties:
        id:
          type: string
          description: Unique recipe identifier
        author_id:
          type: string
          description: ID of the user who created the recipe
        author:
          $ref: "#/components/schemas/RecipeAuthor"
        origin:
          $ref: "#/components/schemas/RecipeOrigin"
          nullable: true
        title:
          type: string
          description: Recipe title
        image_id:
          type: string
          nullable: true
          description: ID of the uploaded image. Can be resolved via the image upload endpoint.
        brew_method:
          $ref: "#/components/schemas/BrewMethod"
        difficulty:
          $ref: "#/components/schemas/Difficulty"
        roast_level:
          $ref: "#/components/schemas/RoastLevel"
        likes_count:
          type: integer
          format: int32
          description: Total number of likes
        is_liked:
          type: boolean
          description: Whether the current user has liked this recipe
        created_at:
          type: string
          format: date-time
          description: Timestamp when the recipe was created
      required:
        - id
        - author_id
        - author
        - title
        - brew_method
        - difficulty
        - likes_count
        - is_liked
        - created_at

    RecipePayload:
      type: object
      additionalProperties: false
      required:
        - title
        - description
        - brew_method
        - difficulty
        - steps
      properties:
        title:
          type: string
          description: Recipe title
        description:
          type: string
          description: Detailed description of the recipe
        image_id:
          type: string
          nullable: true
          description: ID of the uploaded image. Can be resolved via the image upload endpoint.
        brew_method:
          $ref: "#/components/schemas/BrewMethod"
        difficulty:
          $ref: "#/components/schemas/Difficulty"
        roast_level:
          $ref: "#/components/schemas/RoastLevel"
        beans:
          type: string
          nullable: true
          description: Coffee beans used for the recipe
        note:
          type: string
          nullable: true
          description: Private note visible only to the recipe author
        public:
          type: boolean
          default: false
          description: Indicates whether the recipe is publicly visible
        steps:
          type: array
          description: Ordered list of brewing steps
          items:
            $ref: "#/components/schemas/BrewStepPayload"

    CreateRecipeRequest:
      $ref: "#/components/schemas/RecipePayload"

    UpdateRecipeRequest:
      $ref: "#/components/schemas/RecipePayload"

    ApiErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message
      required:
        - error

    Image:
      type: object
      description: Uploaded image
      properties:
        id:
          type: string
          description: Unique image identifier
      required:
        - id

    RegisterRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - password
        - username
      properties:
        email:
          type: string
          format: email
          description: User email address
        username:
          type: string
          description: Unique username. Must be 6-16 characters, letters, numbers and underscores only.
        password:
          type: string
          format: password
          description: User password. Must be 8-32 characters.
        bio:
          type: string
          nullable: true
          description: Short user biography
        avatar_id:
          type: string
          nullable: true
          description: ID of the uploaded avatar image. Can be resolved via the image upload endpoint.

    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - password
        - username
      properties:
        username:
          type: string
          minLength: 1
          description: Unique username
        password:
          type: string
          format: password
          minLength: 1
          description: User password

    RefreshRequest:
      type: object
      additionalProperties: false
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          description: Refresh token obtained during login or registration

    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    AuthResponse:
      type: object
      required:
        - refresh_token
        - access_token
        - user
      properties:
        refresh_token:
          type: string
          description: Token used to obtain a new access token
        access_token:
          type: string
          description: Short-lived token for authenticating requests
        user:
          $ref: "#/components/schemas/UserAccount"

    UserProfile:
      type: object
      description: Public profile of a user, visible to everyone
      required:
        - id
        - username
      properties:
        id:
          type: string
          description: Unique user identifier
        username:
          type: string
          description: Unique username
        bio:
          type: string
          nullable: true
          description: Short user biography
        avatar_id:
          type: string
          nullable: true
          description: ID of the uploaded avatar image. Can be resolved via the image upload endpoint.

    UserAccount:
      description: Full account representation of the authenticated user
      allOf:
        - $ref: "#/components/schemas/UserProfile"
        - type: object
          required:
            - email
          properties:
            email:
              type: string
              format: email
              description: User email address

    UpdateProfileRequest:
      type: object
      additionalProperties: false
      properties:
        username:
          type: string
          description: New username. Must be 6-16 characters, letters, numbers and underscores only.
        bio:
          type: string
          nullable: true
          description: Short user biography
        avatarId:
          type: string
          nullable: true
          description: ID of the uploaded avatar image. Can be resolved via the image upload endpoint.

    TokensResponse:
      type: object
      required:
        - access_token
        - refresh_token
      properties:
        access_token:
          type: string
          description: Short-lived token for authenticating requests
        refresh_token:
          type: string
          description: Token used to obtain a new access token

    LikeTargetType:
      type: string
      enum:
        - recipe
      description: Type of likeable resource

    ToggleLikeResponse:
      type: object
      additionalProperties: false
      required:
        - liked
        - likes_count
      properties:
        liked:
          type: boolean
          description: True if like was added, false if removed
        likes_count:
          type: integer
          format: int32
          description: Updated total likes count

    LikedRecipe:
      type: object
      required:
        - liked_at
        - recipe
      properties:
        liked_at:
          type: string
          format: date-time
        recipe:
          $ref: "#/components/schemas/Recipe"

    RecipeAuthor:
      type: object
      description: Brief author information embedded in recipe responses
      required:
        - id
        - username
      properties:
        id:
          type: string
          description: Unique user identifier
        username:
          type: string
          description: Author's username
        avatar_id:
          type: string
          nullable: true
          description: ID of the author's avatar image

    RecipeOrigin:
      type: object
      description: Reference to the original recipe this was cloned from
      required:
        - recipe_id
        - author
      properties:
        recipe_id:
          type: string
          description: ID of the original recipe
        author:
          $ref: "#/components/schemas/RecipeAuthor"
          description: Author of the original recipe

    ListRecipesParams:
      type: object
      properties:
        authorId:
          type: string
          description: Filter by author
        brewMethod:
          $ref: "#/components/schemas/BrewMethod"
        difficulty:
          $ref: "#/components/schemas/Difficulty"
        roastLevel:
          $ref: "#/components/schemas/RoastLevel"
        query:
          type: string
          description: Search recipes by title or description
        sort_field:
          type: string
          enum:
            - created_at
            - title
          description: Field to sort by
        sort_direction:
          $ref: "#/components/schemas/SortDirection"
        page:
          $ref: "#/components/schemas/PageParam"
        limit:
          $ref: "#/components/schemas/LimitParam"

    RecipePage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Recipe"

    ListUserLikesParams:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/LikeTargetType"
        sort_direction:
          $ref: "#/components/schemas/SortDirection"
        page:
          $ref: "#/components/schemas/PageParam"
        limit:
          $ref: "#/components/schemas/LimitParam"
      required:
        - type

    LikedRecipePage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/LikedRecipe"
