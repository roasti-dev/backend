# yaml-language-server: $schema=https://raw.githubusercontent.com/OAI/OpenAPI-Specification/refs/heads/main/_archive_/schemas/v3.0/schema.yaml
openapi: 3.0.0
info:
  title: Models only
  version: 0.0.1
components:
  parameters:
    ListRecipesParams:
      name: listRecipes
      in: query
      style: form
      explode: true
      schema:
        allOf:
          - $ref: "#/components/schemas/Pagination"
          # - $ref: '#/components/schemas/SortOrder'
          - type: object
            properties:
              authorId:
                type: string
                description: Filter by author
              brewMethod:
                $ref: "#/components/schemas/BrewMethod"
              difficulty:
                $ref: "#/components/schemas/Difficulty"
              sort_field:
                type: string
                enum:
                  - created_at
                  - title
                description: "Field to sort by, e.g. created_at, title, difficulty"
              sort_direction:
                type: string
                enum:
                  - asc
                  - desc
                description: "Sort direction"

  schemas:
    Pagination:
      type: object
      properties:
        limit:
          type: integer
          default: 20
        page:
          type: integer
          default: 1

    # SortOrder:
    #   type: object
    #   properties:
    #     sort_field:
    #       type: string
    #       description: "Field to sort by, e.g. created_at, title, difficulty"
    #     sort_direction:
    #       type: string
    #       enum:
    #         - asc
    #         - desc
    #       description: "Sort direction"
    #   required:
    #     - sort_field
    #     - sort_direction

    BrewMethod:
      type: string
      description: Coffee brewing method
      enum:
        - v60
        - french_press
        - aeropress
        - chemex
        - cold_brew
        - expresso_machine
        - moka_pot

    Difficulty:
      type: string
      description: Difficulty level of the recipe
      enum:
        - easy
        - medium
        - hard

    RoastLevel:
      type: string
      nullable: true
      description: Coffee roast level
      enum:
        - light
        - medium_light
        - medium
        - medium_dark
        - dark

    BrewStep:
      type: object
      description: Single step of the brewing process
      properties:
        id:
          type: integer
          format: int64
          description: Unique step identifier
        order:
          type: integer
          description: Order of the step in the recipe
        title:
          type: string
          description: Short title of the step
        description:
          type: string
          description: Detailed instructions for the step
        duration_seconds:
          type: integer
          nullable: true
          description: Optional duration of the step in seconds
        image_id:
          type: string
          nullable: true
          description: ID of the uploaded image. Can be resolved via the image upload endpoint.
      required:
        - id
        - order
        - title
        - description

    BrewStepPayload:
      type: object
      additionalProperties: false
      description: Single step of the brewing process
      properties:
        order:
          type: integer
          description: Order of the step in the recipe
        title:
          type: string
          description: Short title of the step
        description:
          type: string
          description: Detailed instructions for the step
        duration_seconds:
          type: integer
          nullable: true
          description: Optional duration of the step in seconds
        image_id:
          type: string
          nullable: true
          description: ID of the uploaded image. Can be resolved via the image upload endpoint.
      required:
        - order
        - title
        - description

    Recipe:
      type: object
      description: Coffee brewing recipe
      properties:
        id:
          type: string
          description: Unique recipe identifier
        author_id:
          type: string
          description: ID of the user who created the recipe
        title:
          type: string
          description: Recipe title
        description:
          type: string
          description: Detailed description of the recipe
        image_id:
          type: string
          nullable: true
          description: ID of the uploaded image. Can be resolved via the image upload endpoint.
        brew_method:
          $ref: "#/components/schemas/BrewMethod"
        difficulty:
          $ref: "#/components/schemas/Difficulty"
        roast_level:
          $ref: "#/components/schemas/RoastLevel"
        beans:
          type: string
          nullable: true
          description: Coffee beans used for the recipe
        public:
          type: boolean
          description: Indicates whether the recipe is publicly visible.
        created_at:
          type: string
          format: date-time
          description: "Timestamp when the recipe was created"

        updated_at:
          type: string
          format: date-time
          description: "Timestamp when the recipe was last updated"
        steps:
          type: array
          description: Ordered list of brewing steps
          items:
            $ref: "#/components/schemas/BrewStep"
      required:
        - id
        - author_id
        - title
        - description
        - brew_method
        - difficulty
        - steps
        - public

    RecipePayload:
      type: object
      additionalProperties: false
      required:
        - title
        - description
        - brew_method
        - difficulty
        - steps
      properties:
        title:
          type: string
          description: Recipe title
        description:
          type: string
          description: Detailed description of the recipe
        image_id:
          type: string
          nullable: true
          description: ID of the uploaded image. Can be resolved via the image upload endpoint.
        brew_method:
          $ref: "#/components/schemas/BrewMethod"
        difficulty:
          $ref: "#/components/schemas/Difficulty"
        roast_level:
          $ref: "#/components/schemas/RoastLevel"
        beans:
          type: string
          nullable: true
          description: Coffee beans used for the recipe
        public:
          type: boolean
          default: false
          description: Indicates whether the recipe is publicly visible
        steps:
          type: array
          description: Ordered list of brewing steps
          items:
            $ref: "#/components/schemas/BrewStepPayload"

    CreateRecipeRequest:
      $ref: "#/components/schemas/RecipePayload"

    UpdateRecipeRequest:
      $ref: "#/components/schemas/RecipePayload"

    PatchRecipeRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        image_id:
          type: string
          nullable: true
        brew_method:
          $ref: "#/components/schemas/BrewMethod"
        difficulty:
          $ref: "#/components/schemas/Difficulty"
        roast_level:
          $ref: "#/components/schemas/RoastLevel"
        beans:
          type: string
          nullable: true
        public:
          type: boolean
          description: Whether this recipe is publicly visible
      additionalProperties: false

    ApiErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message
      required:
        - error

    Image:
      type: object
      description: Uploaded image
      properties:
        id:
          type: string
          description: Unique image identifier
      required:
        - id

    RegisterRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - password
        - username
      properties:
        email:
          type: string
          format: email
          description: User email address
        username:
          type: string
          description: Unique username
        password:
          type: string
          format: password
          description: User password
        bio:
          type: string
          nullable: true
          description: Short user biography
        avatar_id:
          type: string
          nullable: true
          description: ID of the uploaded avatar image. Can be resolved via the image upload endpoint.

    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - password
        - username
      properties:
        username:
          type: string
          description: Unique username
        password:
          type: string
          format: password
          description: User password

    RefreshRequest:
      type: object
      additionalProperties: false
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          description: Refresh token obtained during login or registration

    AuthResponse:
      type: object
      required:
        - refresh_token
        - access_token
        - user
      properties:
        refresh_token:
          type: string
          description: Token used to obtain a new access token
        access_token:
          type: string
          description: Short-lived token for authenticating requests
        user:
          $ref: "#/components/schemas/UserProfile"

    UserProfile:
      type: object
      required:
        - id
        - username
      properties:
        id:
          type: string
          description: Unique user identifier
        username:
          type: string
          description: Unique username
        bio:
          type: string
          nullable: true
          description: Short user biography
        avatar_id:
          type: string
          nullable: true
          description: ID of the uploaded avatar image. Can be resolved via the image upload endpoint.
