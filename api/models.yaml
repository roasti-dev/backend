# yaml-language-server: $schema=https://raw.githubusercontent.com/OAI/OpenAPI-Specification/refs/heads/main/_archive_/schemas/v3.0/schema.yaml
openapi: 3.0.0
info:
  title: Models only
  version: 0.0.1
components:
  schemas:
    LimitParam:
      description: Number of items per page
      type: integer
      format: int32
      default: 20

    PageParam:
      description: Page number
      type: integer
      format: int32
      default: 1
      minimum: 1

    SortDirection:
      type: string
      enum:
        - asc
        - desc
      description: Sort direction

    PaginationParams:
      type: object
      properties:
        limit:
          $ref: "#/components/schemas/LimitParam"
        page:
          $ref: "#/components/schemas/PageParam"

    PaginationMeta:
      type: object
      properties:
        items_count:
          type: integer
          format: int32
          minimum: 0
          description: Number of items on the current page
        current_page:
          type: integer
          format: int32
          minimum: 1
          description: Current page number
        next_page:
          type: integer
          format: int32
          minimum: 1
          description: Next page number
        last_page:
          type: integer
          format: int32
          minimum: 1
          description: Last page number
      required:
        - items_count
        - current_page
        - next_page
        - last_page

    Page:
      type: object
      description: Generic paginated response
      properties:
        items:
          type: array
          items: {}
          description: List of items on this page
        pagination:
          $ref: "#/components/schemas/PaginationMeta"
      required:
        - items
        - pagination

    BrewMethod:
      type: string
      description: Coffee brewing method
      enum:
        - v60
        - french_press
        - aeropress
        - chemex
        - cold_brew
        - expresso_machine
        - moka_pot

    Difficulty:
      type: string
      description: Difficulty level of the recipe
      enum:
        - easy
        - medium
        - hard

    RoastLevel:
      type: string
      description: Coffee roast level
      enum:
        - light
        - medium_light
        - medium
        - medium_dark
        - dark

    RecipeIngredient:
      type: object
      description: Single ingredient in a recipe
      properties:
        name:
          type: string
          description: Ingredient name
        amount:
          type: number
          description: Quantity of the ingredient (optional, e.g. 200)
        unit:
          type: string
          description: Unit of measurement, free text (e.g. ml, g, oz)
      required:
        - name

    RecipeIngredientPayload:
      type: object
      additionalProperties: false
      description: Single ingredient in a recipe
      properties:
        name:
          type: string
          description: Ingredient name
        amount:
          type: number
          description: Quantity of the ingredient (optional)
        unit:
          type: string
          description: Unit of measurement, free text (e.g. ml, g, oz)
      required:
        - name

    BrewStep:
      type: object
      description: Single step of the brewing process
      properties:
        id:
          type: integer
          format: int64
          description: Unique step identifier
        order:
          type: integer
          description: Order of the step in the recipe
        title:
          type: string
          description: Short title of the step
        description:
          type: string
          description: Detailed instructions for the step
        duration_seconds:
          type: integer
          description: Optional duration of the step in seconds
        image_id:
          type: string
          description: ID of the uploaded image. Can be resolved via the image upload endpoint.
      required:
        - id
        - order
        - title

    BrewStepPayload:
      type: object
      additionalProperties: false
      description: Single step of the brewing process
      properties:
        order:
          type: integer
          description: Order of the step in the recipe
        title:
          type: string
          description: Short title of the step
        description:
          type: string
          description: Detailed instructions for the step
        duration_seconds:
          type: integer
          description: Optional duration of the step in seconds
        image_id:
          type: string
          description: ID of the uploaded image. Can be resolved via the image upload endpoint.
      required:
        - order
        - title

    Recipe:
      type: object
      description: Coffee brewing recipe
      properties:
        id:
          type: string
          description: Unique recipe identifier
        author_id:
          type: string
          description: ID of the user who created the recipe
        author:
          $ref: "#/components/schemas/UserPreview"
          description: Author of the recipe
        origin:
          $ref: "#/components/schemas/RecipeOrigin"
          description: Present if this recipe was cloned from another recipe
        title:
          type: string
          description: Recipe title
        description:
          type: string
          description: Detailed description of the recipe
        image_id:
          type: string
          description: ID of the uploaded image. Can be resolved via the image upload endpoint.
        brew_method:
          $ref: "#/components/schemas/BrewMethod"
        difficulty:
          $ref: "#/components/schemas/Difficulty"
        roast_level:
          $ref: "#/components/schemas/RoastLevel"
        bean:
          $ref: "#/components/schemas/BeanRef"
          description: Coffee bean used for this recipe. Absent if no bean is attached.
        note:
          type: string
          description: Private note visible only to the recipe author
        public:
          type: boolean
          description: Indicates whether the recipe is publicly visible.
        created_at:
          type: string
          format: date-time
          description: "Timestamp when the recipe was created"
        updated_at:
          type: string
          format: date-time
          description: "Timestamp when the recipe was last updated"
        ingredients:
          type: array
          description: Ordered list of recipe ingredients
          items:
            $ref: "#/components/schemas/RecipeIngredient"
        steps:
          type: array
          description: Ordered list of brewing steps
          items:
            $ref: "#/components/schemas/BrewStep"
        likes_count:
          type: integer
          format: int32
          description: Total number of likes
        is_liked:
          type: boolean
          description: Whether the current user has liked this recipe
      required:
        - id
        - author_id
        - author
        - title
        - description
        - brew_method
        - difficulty
        - ingredients
        - steps
        - public
        - created_at
        - updated_at
        - likes_count
        - is_liked

    RecipePreview:
      type: object
      description: Lightweight recipe representation for lists and cards
      properties:
        id:
          type: string
          description: Unique recipe identifier
        author_id:
          type: string
          description: ID of the user who created the recipe
        author:
          $ref: "#/components/schemas/UserPreview"
        origin:
          $ref: "#/components/schemas/RecipeOrigin"
        title:
          type: string
          description: Recipe title
        image_id:
          type: string
          description: ID of the uploaded image. Can be resolved via the image upload endpoint.
        brew_method:
          $ref: "#/components/schemas/BrewMethod"
        difficulty:
          $ref: "#/components/schemas/Difficulty"
        roast_level:
          $ref: "#/components/schemas/RoastLevel"
        likes_count:
          type: integer
          format: int32
          description: Total number of likes
        is_liked:
          type: boolean
          description: Whether the current user has liked this recipe
        created_at:
          type: string
          format: date-time
          description: Timestamp when the recipe was created
      required:
        - id
        - author_id
        - author
        - title
        - brew_method
        - difficulty
        - likes_count
        - is_liked
        - created_at

    RecipePayload:
      type: object
      additionalProperties: false
      required:
        - title
        - description
        - brew_method
        - difficulty
        - steps
      properties:
        title:
          type: string
          description: Recipe title
        description:
          type: string
          description: Detailed description of the recipe
        image_id:
          type: string
          description: ID of the uploaded image. Can be resolved via the image upload endpoint.
        brew_method:
          $ref: "#/components/schemas/BrewMethod"
        difficulty:
          $ref: "#/components/schemas/Difficulty"
        roast_level:
          $ref: "#/components/schemas/RoastLevel"
        bean_id:
          type: string
          description: ID of the bean to attach to this recipe. Omit or set to null to detach.
        note:
          type: string
          description: Private note visible only to the recipe author
        public:
          type: boolean
          default: false
          description: Indicates whether the recipe is publicly visible
        ingredients:
          type: array
          description: Ordered list of recipe ingredients (max 50)
          items:
            $ref: "#/components/schemas/RecipeIngredientPayload"
          maxItems: 50
        steps:
          type: array
          description: Ordered list of brewing steps
          items:
            $ref: "#/components/schemas/BrewStepPayload"

    CreateRecipeRequest:
      $ref: "#/components/schemas/RecipePayload"

    UpdateRecipeRequest:
      $ref: "#/components/schemas/RecipePayload"

    ApiErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message
      required:
        - error

    Image:
      type: object
      description: Uploaded image
      properties:
        id:
          type: string
          description: Unique image identifier
      required:
        - id

    RegisterRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - password
        - username
      properties:
        email:
          type: string

          description: User email address
        username:
          type: string
          description: Unique username. Must be 6-16 characters, letters, numbers and underscores only.
        password:
          type: string
          format: password
          description: User password. Must be 8-32 characters.
        name:
          type: string
          description: Display name
        bio:
          type: string
          description: Short user biography
        avatar_id:
          type: string
          description: ID of the uploaded avatar image. Can be resolved via the image upload endpoint.

    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - password
        - username
      properties:
        username:
          type: string
          minLength: 1
          description: Unique username
        password:
          type: string
          format: password
          minLength: 1
          description: User password

    RefreshRequest:
      type: object
      additionalProperties: false
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          description: Refresh token obtained during login or registration

    ChangePasswordRequest:
      type: object
      additionalProperties: false
      required:
        - current_password
        - new_password
      properties:
        current_password:
          type: string
          format: password
          description: Current account password
        new_password:
          type: string
          format: password
          description: New password. Must be 8-32 characters.

    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    AuthResponse:
      type: object
      required:
        - refresh_token
        - access_token
        - user
      properties:
        refresh_token:
          type: string
          description: Token used to obtain a new access token
        access_token:
          type: string
          description: Short-lived token for authenticating requests
        user:
          $ref: "#/components/schemas/UserAccount"

    UserProfile:
      type: object
      description: Public profile of a user, visible to everyone
      required:
        - id
        - username
        - followers_count
        - following_count
        - is_following
        - is_followed
      properties:
        id:
          type: string
          description: Unique user identifier
        username:
          type: string
          description: Unique username
        name:
          type: string
          description: Display name
        bio:
          type: string
          description: Short user biography
        avatar_id:
          type: string
          description: ID of the uploaded avatar image. Can be resolved via the image upload endpoint.
        followers_count:
          type: integer
          format: int32
          description: Number of users following this profile
        following_count:
          type: integer
          format: int32
          description: Number of users this profile follows
        is_following:
          type: boolean
          description: Whether the current user follows this profile. False for anonymous users.
        is_followed:
          type: boolean
          description: Whether this profile follows the current user. False for anonymous users.

    UserAccount:
      description: Full account representation of the authenticated user
      allOf:
        - $ref: "#/components/schemas/UserProfile"
        - type: object
          required:
            - email
          properties:
            email:
              type: string
              description: User email address

    UpdateProfileRequest:
      type: object
      additionalProperties: false
      properties:
        username:
          type: string
          description: New username. Must be 6-16 characters, letters, numbers and underscores only.
        name:
          type: string
          nullable: true
          description: Display name
        bio:
          type: string
          nullable: true
          description: Short user biography
        avatar_id:
          type: string
          nullable: true
          description: ID of the uploaded avatar image. Can be resolved via the image upload endpoint.

    TokensResponse:
      type: object
      required:
        - access_token
        - refresh_token
      properties:
        access_token:
          type: string
          description: Short-lived token for authenticating requests
        refresh_token:
          type: string
          description: Token used to obtain a new access token

    LikeTargetType:
      type: string
      enum:
        - recipe
        - post
        - bean
      description: Type of likeable resource

    ToggleLikeResponse:
      type: object
      additionalProperties: false
      required:
        - liked
        - likes_count
      properties:
        liked:
          type: boolean
          description: True if like was added, false if removed
        likes_count:
          type: integer
          format: int32
          description: Updated total likes count

    LikedRecipe:
      type: object
      required:
        - liked_at
        - recipe
      properties:
        liked_at:
          type: string
          format: date-time
        recipe:
          $ref: "#/components/schemas/Recipe"

    UserPreview:
      type: object
      description: Brief user information embedded in resource responses
      required:
        - id
        - username
      properties:
        id:
          type: string
          description: Unique user identifier
        username:
          type: string
          description: Author's username
        name:
          type: string
          description: Author's display name
        avatar_id:
          type: string
          description: ID of the author's avatar image

    RecipeOrigin:
      type: object
      description: Reference to the original recipe this was cloned from
      required:
        - recipe_id
        - author
      properties:
        recipe_id:
          type: string
          description: ID of the original recipe
        author:
          $ref: "#/components/schemas/UserPreview"
          description: Author of the original recipe

    ListRecipesParams:
      type: object
      properties:
        author_id:
          type: string
          description: Filter by author
        brew_method:
          $ref: "#/components/schemas/BrewMethod"
        difficulty:
          $ref: "#/components/schemas/Difficulty"
        roast_level:
          $ref: "#/components/schemas/RoastLevel"
        query:
          type: string
          description: Search recipes by title or description
        sort_field:
          type: string
          enum:
            - created_at
            - title
          description: Field to sort by
        sort_direction:
          $ref: "#/components/schemas/SortDirection"
        page:
          $ref: "#/components/schemas/PageParam"
        limit:
          $ref: "#/components/schemas/LimitParam"

    RecipePage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Recipe"

    ListUserLikesParams:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/LikeTargetType"
        sort_direction:
          $ref: "#/components/schemas/SortDirection"
        page:
          $ref: "#/components/schemas/PageParam"
        limit:
          $ref: "#/components/schemas/LimitParam"
      required:
        - type

    LikedRecipePage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/LikedRecipe"

    PostBlockType:
      type: string
      description: Type of a post content block
      enum:
        - images
        - text
        - recipe

    PostRecipeRef:
      type: object
      description: Reference to a recipe embedded in a post block
      required:
        - id
        - status
      properties:
        id:
          type: string
          description: Recipe ID
        status:
          type: string
          enum:
            - available
            - unavailable
          description: Whether the recipe is currently accessible

    PostBlock:
      type: object
      description: A single content block within a post. The active field is determined by `type`; other fields are omitted.
      required:
        - type
      properties:
        type:
          $ref: "#/components/schemas/PostBlockType"
        images:
          type: array
          description: Ordered list of image IDs (populated when type=images)
          items:
            type: string
        text:
          type: string
          description: Text content (populated when type=text)
        recipe:
          $ref: "#/components/schemas/PostRecipeRef"
          description: Recipe reference (populated when type=recipe)

    PostBlockPayload:
      type: object
      description: Content block for post create/update requests
      additionalProperties: false
      required:
        - type
      properties:
        type:
          $ref: "#/components/schemas/PostBlockType"
        images:
          type: array
          description: Ordered list of image IDs (required when type=images)
          items:
            type: string
        text:
          type: string
          description: Text content (required when type=text)
        recipe_id:
          type: string
          description: Recipe ID reference (required when type=recipe)

    PostComment:
      type: object
      description: A comment on a post
      required:
        - id
        - is_deleted
        - text
        - created_at
        - updated_at
      properties:
        id:
          type: string
          description: Unique comment identifier
        is_deleted:
          type: boolean
          description: Whether the comment has been deleted. When true, author and text are omitted.
        author:
          $ref: "#/components/schemas/UserPreview"
          description: Comment author. Omitted when is_deleted is true.
        text:
          type: string
          description: Comment text. Empty string when is_deleted is true.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the comment was published
        updated_at:
          type: string
          format: date-time
          description: Timestamp of the last edit
        parent_id:
          type: string
          description: ID of the parent comment. Null for top-level comments.

    CommentThread:
      description: A root comment with its direct replies
      allOf:
        - $ref: "#/components/schemas/PostComment"
        - type: object
          required:
            - replies
          properties:
            replies:
              type: array
              description: Direct replies to this comment
              items:
                $ref: "#/components/schemas/PostComment"

    CommentPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/CommentThread"

    Post:
      type: object
      description: A user post in the feed
      required:
        - id
        - title
        - blocks
        - author
        - comments
        - created_at
        - updated_at
        - is_liked
        - likes_count
      properties:
        id:
          type: string
          description: Unique post identifier
        title:
          type: string
          description: Post title
        blocks:
          type: array
          description: Ordered list of content blocks
          items:
            $ref: "#/components/schemas/PostBlock"
        author:
          $ref: "#/components/schemas/UserPreview"
        comments:
          type: array
          description: Comments on this post
          items:
            $ref: "#/components/schemas/PostComment"
        created_at:
          type: string
          format: date-time
          description: Timestamp when the post was created
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the post was last updated
        is_liked:
          type: boolean
          description: Whether the current user has liked this post
        likes_count:
          type: integer
          format: int32
          description: Total number of likes

    PostPayload:
      type: object
      additionalProperties: false
      required:
        - title
        - blocks
      properties:
        title:
          type: string
          description: Post title
        blocks:
          type: array
          description: Ordered list of content blocks
          items:
            $ref: "#/components/schemas/PostBlockPayload"

    CreatePostRequest:
      $ref: "#/components/schemas/PostPayload"

    UpdatePostRequest:
      $ref: "#/components/schemas/PostPayload"

    CreatePostCommentRequest:
      type: object
      additionalProperties: false
      required:
        - text
      properties:
        text:
          type: string
          description: Comment text
        parent_id:
          type: string
          description: ID of the parent comment. Omit for top-level comments.

    UpdatePostCommentRequest:
      type: object
      additionalProperties: false
      required:
        - text
      properties:
        text:
          type: string
          description: New comment text

    PostPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Post"

    LikedPost:
      type: object
      required:
        - liked_at
        - post
      properties:
        liked_at:
          type: string
          format: date-time
          description: Timestamp when the post was liked
        post:
          $ref: "#/components/schemas/Post"

    LikedPostPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/LikedPost"

    NotificationType:
      type: string
      description: Type of notification
      enum:
        - like_recipe
        - like_post
        - like_bean
        - comment_recipe
        - comment_post
        - comment_bean

    Notification:
      type: object
      description: An in-app notification for the current user
      required:
        - id
        - type
        - actor
        - entity_id
        - created_at
      properties:
        id:
          type: string
          description: Unique notification identifier
        type:
          $ref: "#/components/schemas/NotificationType"
          description: Notification type
        actor:
          $ref: "#/components/schemas/UserPreview"
          description: User who triggered the notification
        entity_id:
          type: string
          description: ID of the recipe or post this notification relates to
        read_at:
          type: string
          format: date-time
          description: When the notification was read. Absent if unread.
        created_at:
          type: string
          format: date-time
          description: When the notification was created

    NotificationPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Notification"

    NotificationUnreadCount:
      type: object
      description: Count of unread notifications
      required:
        - unread_count
      properties:
        unread_count:
          type: integer
          format: int32
          minimum: 0
          description: Number of unread notifications for the current user

    BeanRoastType:
      type: string
      description: Intended roast type for the bean
      x-enum-varnames:
        - BeanRoastTypeEspresso
        - BeanRoastTypeFilter
      enum:
        - espresso
        - filter

    BeanRef:
      type: object
      description: Reference to a bean attached to a recipe
      required:
        - id
        - name
        - roast_type
        - roaster
        - status
      properties:
        id:
          type: string
          description: Unique bean identifier
        name:
          type: string
          description: Bean name
        roast_type:
          $ref: "#/components/schemas/BeanRoastType"
          description: Intended roast type
        roaster:
          type: string
          description: Name of the roaster
        status:
          type: string
          enum:
            - available
            - unavailable
          description: Whether the bean is currently available in the catalog

    Bean:
      type: object
      description: A coffee bean in the global catalog
      required:
        - id
        - name
        - roast_type
        - roaster
        - author
        - created_at
        - likes_count
        - is_liked
      properties:
        id:
          type: string
          description: Unique bean identifier
        name:
          type: string
          description: Bean name
        roast_type:
          $ref: "#/components/schemas/BeanRoastType"
          description: Intended roast type
        roaster:
          type: string
          description: Name of the roaster
        country:
          type: string
          description: Country of origin
        region:
          type: string
          description: Region within the country (e.g. Yirgacheffe, Huila)
        farm:
          type: string
          description: Farm or cooperative name
        process:
          type: array
          description: Processing methods (e.g. washed, natural, honey)
          items:
            type: string
        descriptors:
          type: array
          description: Flavor descriptors
          items:
            type: string
        q_score:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Q-grading score on the SCA scale (0–100)
        url:
          type: string
          description: Link to the bean's page at the roaster
        image_id:
          type: string
          description: ID of the uploaded bean image
        author:
          $ref: "#/components/schemas/UserPreview"
          description: User who added this bean to the catalog
        created_at:
          type: string
          format: date-time
          description: When the bean was added to the catalog
        likes_count:
          type: integer
          format: int32
          description: Number of likes on this bean
        is_liked:
          type: boolean
          description: Whether the current user has liked this bean

    BeanPayload:
      type: object
      description: Fields for creating or updating a bean
      additionalProperties: false
      required:
        - name
        - roast_type
        - roaster
      properties:
        name:
          type: string
          description: Bean name
        roast_type:
          $ref: "#/components/schemas/BeanRoastType"
          description: Intended roast type
        roaster:
          type: string
          description: Name of the roaster
        country:
          type: string
          description: Country of origin
        region:
          type: string
          description: Region within the country
        farm:
          type: string
          description: Farm or cooperative name
        process:
          type: array
          description: Processing methods
          items:
            type: string
        descriptors:
          type: array
          description: Flavor descriptors
          items:
            type: string
        q_score:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Q-grading score on the SCA scale (0–100)
        url:
          type: string
          description: Link to the bean's page at the roaster
        image_id:
          type: string
          description: ID of the uploaded bean image

    CreateBeanRequest:
      $ref: "#/components/schemas/BeanPayload"

    UpdateBeanRequest:
      $ref: "#/components/schemas/BeanPayload"

    BeanPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Bean"

    UserPreviewPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - type: object
          properties:
            items:
              type: array
              description: List of user previews
              items:
                $ref: "#/components/schemas/UserPreview"
